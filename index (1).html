<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find Your Representatives – Institute for the Public Good</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ipg-navy: #0d2340;
    --ipg-teal: #00a89c;
    --ipg-teal-light: #e6f7f6;
    --ipg-gray: #f4f6f8;
    --ipg-border: #d0d8e4;
    --ipg-text: #1a2b3c;
    --ipg-muted: #6b7f93;
    --dem: #1a6bbf;
    --rep: #c0392b;
    --radius: 8px;
    --shadow: 0 2px 12px rgba(13,35,64,0.10);
  }
  html, body { width: 100%; height: 100%; margin: 0; padding: 0; font-family: 'Sora', sans-serif; background: var(--ipg-gray); color: var(--ipg-text); overflow: hidden; }
  .app-wrapper { display: flex; flex-direction: column; width: 100vw; height: 100vh; }
  .header { background: var(--ipg-navy); padding: 12px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 3px solid var(--ipg-teal); flex-shrink: 0; position: relative; z-index: 10; }
  .header-logo { width: 32px; height: 32px; background: var(--ipg-teal); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-family: 'IBM Plex Mono', monospace; font-weight: 500; color: white; font-size: 11px; flex-shrink: 0; }
  .header-title { color: white; font-size: 15px; font-weight: 600; }
  .header-sub { color: rgba(255,255,255,0.5); font-size: 11px; font-weight: 300; margin-top: 1px; }
  .app-body { display: flex; flex: 1; min-height: 0; overflow: hidden; }
  .sidebar { width: 320px; flex-shrink: 0; background: white; border-right: 1px solid var(--ipg-border); display: flex; flex-direction: column; overflow: hidden; position: relative; z-index: 5; }
  .search-section { padding: 14px 16px; border-bottom: 1px solid var(--ipg-border); flex-shrink: 0; position: relative; z-index: 1000; }
  .search-label { font-size: 10px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; color: var(--ipg-muted); margin-bottom: 8px; }
  .search-row { display: flex; gap: 7px; }
  #addressInput { flex: 1; padding: 9px 12px; border: 1.5px solid var(--ipg-border); border-radius: var(--radius); font-family: 'Sora', sans-serif; font-size: 13px; color: var(--ipg-text); outline: none; transition: border-color 0.2s; min-width: 0; }
  #addressInput:focus { border-color: var(--ipg-teal); }
  .search-btn { background: var(--ipg-teal); color: white; border: none; border-radius: var(--radius); padding: 9px 13px; font-family: 'Sora', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: background 0.2s; flex-shrink: 0; }
  .search-btn:hover { background: #008c82; }
  .pac-container { z-index: 9999 !important; font-family: 'Sora', sans-serif !important; border: 1.5px solid var(--ipg-teal) !important; border-top: none !important; border-radius: 0 0 var(--radius) var(--radius) !important; box-shadow: 0 4px 16px rgba(13,35,64,0.15) !important; pointer-events: all !important; }
  .pac-item { font-size: 12px !important; padding: 8px 12px !important; cursor: pointer !important; line-height: 1.4 !important; }
  .pac-item:hover { background: var(--ipg-teal-light) !important; }
  .pac-item-selected { background: var(--ipg-teal-light) !important; }
  .pac-matched { color: var(--ipg-teal) !important; font-weight: 600 !important; }
  .pac-icon { display: none !important; }
  .layer-tabs { display: flex; border-bottom: 1px solid var(--ipg-border); background: var(--ipg-gray); padding: 0 10px; overflow-x: auto; flex-shrink: 0; }
  .layer-tab { padding: 9px 10px; font-size: 10px; font-weight: 600; letter-spacing: 0.4px; text-transform: uppercase; color: var(--ipg-muted); cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; transition: all 0.15s; background: none; border-top: none; border-left: none; border-right: none; font-family: 'Sora', sans-serif; }
  .layer-tab:hover { color: var(--ipg-teal); }
  .layer-tab.active { color: var(--ipg-teal); border-bottom-color: var(--ipg-teal); }
  .results-section { flex: 1; overflow-y: auto; padding: 14px 16px; }
  .placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 10px; text-align: center; padding: 30px 16px; }
  .placeholder-icon { width: 48px; height: 48px; background: var(--ipg-teal-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
  .placeholder h3 { font-size: 14px; font-weight: 600; }
  .placeholder p { font-size: 12px; color: var(--ipg-muted); line-height: 1.5; }
  .rep-card { background: white; border: 1.5px solid var(--ipg-border); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; transition: border-color 0.2s, box-shadow 0.2s; }
  .rep-card:hover { border-color: var(--ipg-teal); box-shadow: var(--shadow); }
  .rep-card-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
  .rep-avatar { width: 42px; height: 42px; border-radius: 50%; background: var(--ipg-gray); border: 2px solid var(--ipg-border); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .rep-info { flex: 1; }
  .rep-name { font-size: 14px; font-weight: 700; color: var(--ipg-text); line-height: 1.2; }
  .rep-title { font-size: 11px; color: var(--ipg-muted); margin-top: 2px; }
  .party-badge { display: inline-block; padding: 2px 7px; border-radius: 20px; font-size: 10px; font-weight: 600; margin-top: 4px; font-family: 'IBM Plex Mono', monospace; }
  .party-badge.D { background: #dbeafe; color: var(--dem); }
  .party-badge.R { background: #fee2e2; color: var(--rep); }
  .rep-district { background: var(--ipg-teal-light); border-radius: 6px; padding: 7px 10px; margin-bottom: 8px; font-size: 11px; }
  .rep-district strong { font-family: 'IBM Plex Mono', monospace; color: var(--ipg-teal); }
  .rep-contacts { display: flex; flex-direction: column; gap: 4px; }
  .rep-contact-link { display: flex; align-items: center; gap: 7px; font-size: 11px; color: var(--ipg-teal); text-decoration: none; padding: 3px 0; }
  .rep-contact-link:hover { color: #008c82; }
  .rep-contact-link .icon { font-size: 12px; width: 14px; text-align: center; }
  .status-bar { padding: 6px 16px; background: var(--ipg-gray); border-top: 1px solid var(--ipg-border); font-size: 10px; color: var(--ipg-muted); font-family: 'IBM Plex Mono', monospace; flex-shrink: 0; }
  #map { flex: 1; min-width: 0; min-height: 0; }
  .msg-loading, .msg-error { padding: 10px 12px; border-radius: var(--radius); font-size: 12px; margin-bottom: 10px; }
  .msg-loading { background: var(--ipg-teal-light); color: var(--ipg-teal); display: flex; align-items: center; gap: 8px; }
  .msg-error { background: #fee2e2; color: #c0392b; }
  .spinner { width: 12px; height: 12px; border: 2px solid rgba(0,168,156,0.3); border-top-color: var(--ipg-teal); border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="app-wrapper">
  <div class="header">
    <div class="header-logo">IPG</div>
    <div>
      <div class="header-title">Find Your Representatives</div>
      <div class="header-sub">Institute for the Public Good — Illinois</div>
    </div>
  </div>
  <div class="app-body">
    <div class="sidebar">
      <div class="search-section">
        <div class="search-label">Enter Your Address</div>
        <div class="search-row">
          <input type="text" id="addressInput" placeholder="123 Main St, Chicago, IL" autocomplete="off" />
          <button class="search-btn" onclick="doSearch()">Search</button>
        </div>
      </div>
      <div class="layer-tabs">
        <button class="layer-tab active" onclick="switchLayer('house',this)">IL House</button>
        <button class="layer-tab" onclick="switchLayer('senate',this)">IL Senate</button>
        <button class="layer-tab" onclick="switchLayer('congress',this)">Congress</button>
        <button class="layer-tab" onclick="switchLayer('ward',this)">Chi. Wards</button>
        <button class="layer-tab" onclick="switchLayer('school',this)">School Board</button>
      </div>
      <div class="results-section" id="resultsSection">
        <div class="placeholder">
          <div class="placeholder-icon">📍</div>
          <h3>Enter your address to get started</h3>
          <p>We'll find your IL House, Senate, Congressional, Chicago Ward, and School Board representatives.</p>
        </div>
      </div>
      <div class="status-bar" id="statusBar">Ready</div>
    </div>
    <div id="map"></div>
  </div>
</div>

const GEOJSON_SOURCES = {
  house:    'https://geoservices.epa.illinois.gov/arcgis/rest/services/Boundaries/LegislativeDistricts/MapServer/3/query?where=1%3D1&outFields=*&outSR=4326&f=geojson',
  senate:   'https://geoservices.epa.illinois.gov/arcgis/rest/services/Boundaries/LegislativeDistricts/MapServer/2/query?where=1%3D1&outFields=*&outSR=4326&f=geojson',
  congress: 'https://geoservices.epa.illinois.gov/arcgis/rest/services/Boundaries/LegislativeDistricts/MapServer/4/query?where=1%3D1&outFields=*&outSR=4326&f=geojson',
  ward:     'wards.geojson',
  school:   'https://data.cityofchicago.org/api/geospatial/8mea-i9j8?method=export&type=GeoJSON',
};

let map, autocomplete;
let currentLayer = 'house';
let foundDistrict = null;
let searchMarker = null;
let searchedLat = null, searchedLng = null;
let allResults = {};

window.addEventListener('DOMContentLoaded', function() {
  map = new google.maps.Map(document.getElementById('map'), {
    center: { lat: 41.85, lng: -88.0 },
    zoom: 7,
    mapTypeControl: false,
    streetViewControl: false,
    fullscreenControl: true,
    styles: [
      { featureType: 'water', elementType: 'geometry', stylers: [{ color: '#c9d8e8' }] },
      { featureType: 'landscape', elementType: 'geometry', stylers: [{ color: '#f4f6f8' }] },
      { featureType: 'road', elementType: 'geometry', stylers: [{ color: '#ffffff' }] },
      { featureType: 'road', elementType: 'geometry.stroke', stylers: [{ color: '#d0d8e4' }] },
      { featureType: 'poi', stylers: [{ visibility: 'off' }] },
      { featureType: 'administrative', elementType: 'geometry.stroke', stylers: [{ color: '#a0b0c0' }] },
      { featureType: 'administrative', elementType: 'labels.text.fill', stylers: [{ color: '#4a6070' }] },
    ]
  });

  const ilBounds = new google.maps.LatLngBounds(
    new google.maps.LatLng(36.97, -91.51),
    new google.maps.LatLng(42.51, -87.02)
  );
  autocomplete = new google.maps.places.Autocomplete(
    document.getElementById('addressInput'),
    { bounds: ilBounds, componentRestrictions: { country: 'us' }, types: ['address'] }
  );
  document.getElementById('addressInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') e.preventDefault();
  });
  autocomplete.addListener('place_changed', function() {
    var place = autocomplete.getPlace();
    if (!place.geometry || !place.geometry.location) { showError('Please select an address from the dropdown.'); return; }
    var loc = place.geometry.location;
    searchedLat = loc.lat(); searchedLng = loc.lng();
    placeMarkerAndSearch(loc);
  });
  loadLayer(currentLayer);
});

function doSearch() {
  var val = document.getElementById('addressInput').value.trim();
  if (!val) return;
  if (searchedLat !== null) { findAndShowDistrict(searchedLat, searchedLng, currentLayer); return; }
  showLoading(); setStatus('Geocoding…');
  var geocoder = new google.maps.Geocoder();
  geocoder.geocode({ address: val + ', Illinois', region: 'us' }, function(results, status) {
    if (status !== 'OK' || !results[0]) { showError('Address not found. Try selecting from the dropdown.'); setStatus('Not found'); return; }
    var loc = results[0].geometry.location;
    searchedLat = loc.lat(); searchedLng = loc.lng();
    placeMarkerAndSearch(loc);
  });
}

function placeMarkerAndSearch(loc) {
  if (searchMarker) searchMarker.setMap(null);
  searchMarker = new google.maps.Marker({
    position: loc, map,
    icon: { path: google.maps.SymbolPath.CIRCLE, scale: 9, fillColor: '#00a89c', fillOpacity: 1, strokeColor: 'white', strokeWeight: 2.5 }
  });
  map.panTo(loc); map.setZoom(11);
  allResults = {};
  findAndShowDistrict(loc.lat(), loc.lng(), currentLayer);
}

var GEOJSON_FALLBACKS = {};

function loadLayer(layer, onLoadedCallback) {
  map.data.forEach(function(f) { map.data.remove(f); });
  var url = GEOJSON_SOURCES[layer];
  if (!url) return;
  setStatus('Loading ' + layerLabel(layer) + ' boundaries…');
  fetch(url)
    .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(function(data) { onLayerLoaded(data, layer, onLoadedCallback); })
    .catch(function(err) {
      var fallback = GEOJSON_FALLBACKS[layer];
      if (fallback) {
        setStatus('Trying alternate source for ' + layerLabel(layer) + '…');
        fetch(fallback)
          .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
          .then(function(data) { onLayerLoaded(data, layer, onLoadedCallback); })
          .catch(function() { setStatus('Failed to load ' + layerLabel(layer) + ' boundaries'); });
      } else {
        setStatus('Failed to load ' + layerLabel(layer) + ': ' + err.message);
      }
    });
}

function onLayerLoaded(data, layer, onLoadedCallback) {
  map.data.addGeoJson(data);
  map.data.setStyle(function(feature) { return styleFeature(feature); });
  map.data.addListener('click', function(e) {
    var num = getDistrictNum(e.feature, layer);
    if (num) { highlightDistrict(num); showRepCard(layer, num); }
  });
  setStatus(layerLabel(layer) + ' loaded — ' + (data.features ? data.features.length : 0) + ' districts');
  if (onLoadedCallback) onLoadedCallback();
}

function styleFeature(feature) {
  var num = getDistrictNum(feature, currentLayer);
  var isFound = foundDistrict !== null && num === foundDistrict;
  return {
    fillColor: isFound ? '#00a89c' : '#0d2340', fillOpacity: isFound ? 0.22 : 0.05,
    strokeColor: isFound ? '#00a89c' : '#0d2340', strokeWeight: isFound ? 2.5 : 0.7, strokeOpacity: isFound ? 1 : 0.35,
  };
}

function getDistrictNum(feature, layer) {
  var keys = ['DistrictNum','SenateNum','HouseNum','DISTRICTID','DISTRICT','district','WARD_NUM','ward_num','WARD','ward','CD','cd','GEOID','geoid','number','Number','NAME','name','District','district_n','DISTRICT_N'];
  for (var i = 0; i < keys.length; i++) {
    var v = feature.getProperty(keys[i]);
    if (v !== undefined && v !== null && v !== '') { var n = parseInt(v, 10); if (!isNaN(n) && n > 0) return n; }
  }
  return null;
}

function highlightDistrict(num) {
  foundDistrict = num;
  map.data.setStyle(function(feature) { return styleFeature(feature); });
}

function switchLayer(layer, tabEl) {
  currentLayer = layer; foundDistrict = null;
  document.querySelectorAll('.layer-tab').forEach(function(t) { t.classList.remove('active'); });
  tabEl.classList.add('active');
  if (allResults[layer]) {
    showRepCard(layer, allResults[layer]);
    var distNum = allResults[layer];
    loadLayer(layer, function() { highlightDistrict(distNum); setStatus(layerLabel(layer) + ': District ' + distNum); });
  } else if (searchedLat !== null) {
    loadLayer(layer, function() { findAndShowDistrict(searchedLat, searchedLng, layer); });
  } else {
    showPlaceholder();
    loadLayer(layer);
  }
}

function findAndShowDistrict(lat, lng, layer) {
  setStatus('Finding your ' + layerLabel(layer) + ' district…'); showLoading();
  var point = new google.maps.LatLng(lat, lng);
  var found = null;
  map.data.forEach(function(feature) {
    if (found) return;
    var geo = feature.getGeometry(); if (!geo) return;
    if (isPointInFeature(point, geo)) found = getDistrictNum(feature, layer);
  });
  if (found) {
    allResults[layer] = found; highlightDistrict(found); showRepCard(layer, found);
    setStatus(layerLabel(layer) + ': District ' + found);
  } else { showNoResult(layer); setStatus('District not found'); }
}

function isPointInFeature(point, geometry) {
  var type = geometry.getType();
  if (type === 'Polygon') { return google.maps.geometry.poly.containsLocation(point, new google.maps.Polygon({ paths: geometry.getArray()[0].getArray() })); }
  if (type === 'MultiPolygon') {
    var polys = geometry.getArray();
    for (var i = 0; i < polys.length; i++) { if (google.maps.geometry.poly.containsLocation(point, new google.maps.Polygon({ paths: polys[i].getArray()[0].getArray() }))) return true; }
  }
  return false;
}

function layerLabel(l) { return { house:'IL House', senate:'IL Senate', congress:'Congressional', ward:'Chicago Ward', school:'School Board' }[l] || l; }
function showLoading() { document.getElementById('resultsSection').innerHTML = '<div class="msg-loading"><div class="spinner"></div> Looking up your district…</div>'; }
function showError(msg) { document.getElementById('resultsSection').innerHTML = '<div class="msg-error">⚠️ ' + msg + '</div>'; }
function showPlaceholder() { document.getElementById('resultsSection').innerHTML = '<div class="placeholder"><div class="placeholder-icon">📍</div><h3>Enter your address to get started</h3><p>We\'ll find your IL House, Senate, Congressional, Chicago Ward, and School Board representatives.</p></div>'; }
function showNoResult(layer) { document.getElementById('resultsSection').innerHTML = '<div class="msg-error">No ' + layerLabel(layer) + ' district found. Chicago Ward and School Board layers apply to Chicago addresses only.</div>'; }

function showRepCard(layer, distNum) {
  var rep = REPS[layer] && REPS[layer][distNum];
  var label = layerLabel(layer);
  var html = '';
  if (rep) {
    var badge = rep.party ? '<span class="party-badge ' + rep.party + '">' + (rep.party === 'D' ? 'Democrat' : rep.party === 'R' ? 'Republican' : 'Independent') + '</span>' : '';
    var phone = rep.phone ? '<a class="rep-contact-link" href="tel:' + rep.phone + '"><span class="icon">📞</span>' + rep.phone + '</a>' : '';
    var email = rep.email ? '<a class="rep-contact-link" href="mailto:' + rep.email + '"><span class="icon">✉️</span>' + rep.email + '</a>' : '';
    var web = rep.website ? '<a class="rep-contact-link" href="' + rep.website + '" target="_blank"><span class="icon">🔗</span>Official Website</a>' : '';
    html = '<div class="rep-card"><div class="rep-card-header"><div class="rep-avatar">👤</div><div class="rep-info"><div class="rep-name">' + rep.name + '</div><div class="rep-title">' + label + '</div>' + badge + '</div></div><div class="rep-district">District: <strong>' + distNum + '</strong> — ' + rep.district + '</div><div class="rep-contacts">' + phone + email + web + '</div></div>';
  } else {
    html = '<div class="rep-card"><div class="rep-card-header"><div class="rep-avatar">📋</div><div class="rep-info"><div class="rep-name">' + label + ' — District ' + distNum + '</div><div class="rep-title">Representative info coming soon</div></div></div><div class="rep-district">District: <strong>' + distNum + '</strong></div><div class="rep-contacts"><a class="rep-contact-link" href="https://www.ilga.gov" target="_blank"><span class="icon">🔗</span>Illinois General Assembly</a></div></div>';
  }
  document.getElementById('resultsSection').innerHTML = html;
}

function setStatus(msg) { document.getElementById('statusBar').textContent = msg; }
</script>
